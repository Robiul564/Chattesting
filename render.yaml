services:
  - type: web
    name: whatsapp-platform-api
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm run render:build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: whatsapp-platform-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: whatsapp-platform-redis
          property: connectionString
      - key: META_APP_SECRET
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
  - type: redis
    name: whatsapp-platform-redis
    plan: starter
    ipAllowList:
      - source: 0.0.0.0/0
        description: public
databases:
  - name: whatsapp-platform-db
    plan: starter
    ipAllowList:
      - source: 0.0.0.0/0
        description: public
